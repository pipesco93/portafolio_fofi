<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Fofi</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="/src/styles/variables.css" />
  <link rel="stylesheet" href="/src/styles/global.css" />
  <link rel="stylesheet" href="/src/styles/layout.css" />
  <link rel="stylesheet" href="/src/styles/components.css" />
  <link rel="stylesheet" href="/src/styles/animations.css" />

<body class="page-project-detail">
  <div class="cursor"></div>

  <header class="header">
    <div class="container nav-container">
      <a href="/" class="logo">FOFI</a>
      <button class="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
      <nav class="main-nav">
        <a href="/">Home</a>
        <a href="/projects.html" class="active">Work</a>
        <a href="/rates.html">Rates</a>
        <a href="/#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main style="padding-top: 120px;">
    <div class="container">
      <!-- Project Header: brand, title, meta -->
      <div class="project-header">
        <p class="project-brand" id="pd-brand">Loading...</p>
        <h1 class="project-title" id="pd-title"></h1>
        <div class="project-meta" id="pd-meta"></div>
      </div>

      <!-- Hero Image — first image, full width -->
      <div class="project-hero-image" id="pd-hero-image"></div>

      <!-- Gallery — remaining images in 2-col staggered grid -->
      <div class="gallery-grid" id="pd-gallery"></div>

      <!-- Description -->
      <p class="project-description" id="pd-description"></p>

      <!-- Prev / Next Navigation -->
      <nav class="project-nav" id="pd-nav"></nav>
    </div>

    <!-- CTA -->
    <section class="cta-block">
      <div class="container">
        <h2>Interested in working together?</h2>
        <div class="cta-actions">
          <a href="/#contact" class="btn btn-primary">Get in touch</a>
          <a href="/projects.html" class="cta-link">View all work</a>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-container">
      <a href="/" class="logo">FOFI</a>
      <!-- SOCIAL -->
      <div class="social-links">
        <a href="#" aria-label="Instagram">Instagram</a>
        <a href="mailto:fofi@example.com" aria-label="Email">Email</a>
      </div>
      <p style="color: var(--color-text-muted); font-size: var(--text-xs);">&copy; 2026 Fofi. All rights reserved.</p>
    </div>
