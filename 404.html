<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Fofi</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="/src/styles/variables.css" />
  <link rel="stylesheet" href="/src/styles/global.css" />
  <link rel="stylesheet" href="/src/styles/layout.css" />
  <link rel="stylesheet" href="/src/styles/components.css" />

  <style>
    .not-found {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-xl) var(--space-md);
    }

    .not-found-content {
      max-width: 600px;
    }

    .not-found-code {
      font-family: var(--font-serif);
      font-size: clamp(6rem, 20vw, 12rem);
      line-height: 1;
      color: var(--color-border);
      margin-bottom: var(--space-md);
    }

    .not-found-title {
      font-size: var(--text-2xl);
      margin-bottom: var(--space-sm);
    }

    .not-found-text {
      color: var(--color-text-muted);
      font-size: var(--text-lg);
      margin-bottom: var(--space-lg);
    }

    .not-found-link {
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid currentColor;
      padding-bottom: 4px;
    }
  </style>
</head>

<body>
  <div class="cursor"></div>

  <header class="header">
    <div class="container nav-container">
      <a href="/" class="logo">FOFI</a>
      <button class="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
      <nav class="main-nav">
        <a href="/">Home</a>
        <a href="/projects.html">Work</a>
        <a href="/rates.html">Rates</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="not-found">
      <div class="not-found-content">
        <div class="not-found-code">404</div>
        <h1 class="not-found-title">Page not found</h1>
        <p class="not-found-text">The page you are looking for has moved or doesn't exist.</p>
        <a href="/" class="not-found-link">Back to home</a>
      </div>
    </section>
  </main>

  <script>
    // Custom cursor
    const cursor = document.querySelector('.cursor');
    window.addEventListener('mousemove', (e) => {
      cursor.style.transform = `translate(${e.clientX - 10}px, ${e.clientY - 10}px)`;
    });

    // Mobile menu
    const hamburger = document.querySelector('.hamburger');
    const mainNav = document.querySelector('.main-nav');
    if (hamburger && mainNav) {
      hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('open');
        mainNav.classList.toggle('open');
      });
    }
  </script>
</body>

</html>
